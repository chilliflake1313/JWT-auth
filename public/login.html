<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-2: #115e59;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #cffafe 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.4rem;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .hint {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.96rem;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
      margin-bottom: 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: var(--text);
      font-weight: 600;
    }

    .secondary-btn:hover {
      background: #cbd5e1;
    }

    #msg, #loginMsg, #forgotMsg, #resetMsg {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .link {
      margin-top: 14px;
      text-align: center;
      font-size: 0.92rem;
    }

    .forgot-link {
      display: block;
      margin-top: 10px;
      text-align: center;
      font-size: 0.85rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Login Form -->
    <div id="loginSection">
      <h2>Login</h2>
      <p class="hint">Enter your credentials to access your account.</p>

      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <p id="loginMsg"></p>

      <div class="forgot-link">
        <a onclick="showForgotPassword()">Forgot password?</a>
      </div>

      <div class="link">No account yet? <a href="/signup.html">Signup</a></div>
    </div>

    <!-- Forgot Password Form -->
    <div id="forgotSection" class="hidden">
      <h3>Reset Password</h3>
      <p class="hint">Enter your email to receive an OTP.</p>

      <form id="forgotForm">
        <input type="email" id="forgotEmail" placeholder="Email" required />
        <button type="submit">Send OTP</button>
      </form>

      <p id="forgotMsg"></p>
    </div>

    <!-- Verify OTP & Reset Password Form -->
    <div id="resetSection" class="hidden">
      <h3>Reset Password</h3>
      <p class="hint">Enter the OTP sent to your email.</p>

      <form id="resetForm">
        <input type="text" id="resetOtp" placeholder="OTP" required />
        <input type="password" id="resetPassword" placeholder="New Password" required />
        <button type="submit">Reset Password</button>
      </form>

      <p id="resetMsg"></p>
    </div>

    <button class="secondary-btn hidden" id="backBtn" onclick="backToLogin()">
      Back to Login
    </button>
  </div>

  <script>
    const API = "/auth";

    // ===== LOGIN SECTION =====
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const msg = document.getElementById("loginMsg");

      try {
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("accessToken", data.accessToken);
          localStorage.setItem("refreshToken", data.refreshToken);
          msg.textContent = "✓ Login successful";
          msg.style.color = "#10b981";
        } else {
          msg.textContent = data.error || "Login failed";
          msg.style.color = "#ef4444";
        }
      } catch {
        msg.textContent = "Could not connect to server";
        msg.style.color = "#ef4444";
      }
    };

    // ===== FORGOT PASSWORD SECTION =====
    function showForgotPassword() {
      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("forgotSection").classList.remove("hidden");
      document.getElementById("backBtn").classList.remove("hidden");
    }

    document.getElementById("forgotForm").onsubmit = async (e) => {
      e.preventDefault();

      const email = document.getElementById("forgotEmail").value;
      const msg = document.getElementById("forgotMsg");

      try {
        const res = await fetch(API + "/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.textContent = "✓ OTP sent to your email";
          msg.style.color = "#10b981";
          document.getElementById("forgotForm").style.display = "none";
          setTimeout(() => {
            document.getElementById("forgotSection").classList.add("hidden");
            document.getElementById("resetSection").classList.remove("hidden");
          }, 2000);
        } else {
          msg.textContent = data.error || "Failed to send OTP";
          msg.style.color = "#ef4444";
        }
      } catch {
        msg.textContent = "Could not connect to server";
        msg.style.color = "#ef4444";
      }
    };

    // ===== RESET PASSWORD SECTION =====
    document.getElementById("resetForm").onsubmit = async (e) => {
      e.preventDefault();

      const email = document.getElementById("forgotEmail").value;
      const otp = document.getElementById("resetOtp").value;
      const newPassword = document.getElementById("resetPassword").value;
      const msg = document.getElementById("resetMsg");

      try {
        const res = await fetch(API + "/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp, newPassword }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.textContent = "✓ Password reset successfully. Redirecting...";
          msg.style.color = "#10b981";
          setTimeout(() => {
            backToLogin();
            document.getElementById("loginForm").reset();
          }, 2000);
        } else {
          msg.textContent = data.error || "Password reset failed";
          msg.style.color = "#ef4444";
        }
      } catch {
        msg.textContent = "Could not connect to server";
        msg.style.color = "#ef4444";
      }
    };

    // ===== UTILITIES =====
    function backToLogin() {
      document.getElementById("loginSection").classList.remove("hidden");
      document.getElementById("forgotSection").classList.add("hidden");
      document.getElementById("resetSection").classList.add("hidden");
      document.getElementById("backBtn").classList.add("hidden");
      document.getElementById("forgotForm").style.display = "block";

      document.getElementById("loginMsg").textContent = "";
      document.getElementById("forgotMsg").textContent = "";
      document.getElementById("resetMsg").textContent = "";
    }
  </script>
</body>
</html>
