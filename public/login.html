<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-2: #115e59;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #cffafe 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.4rem;
    }

    .hint {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.96rem;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    #msg {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
    }

    .link {
      margin-top: 14px;
      text-align: center;
      font-size: 0.92rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <p class="hint">Use your email and password to get JWT tokens.</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
    <p class="link">No account yet? <a href="/signup.html">Signup</a></p>
  </div>

  <script>
    const API = "/auth";
    const loginForm = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    loginForm.onsubmit = async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("accessToken", data.accessToken);
          localStorage.setItem("refreshToken", data.refreshToken);
          msg.textContent = "Login success";
        } else {
          msg.textContent = data.error || "Login failed";
        }
      } catch {
        msg.textContent = "Could not connect to server";
      }
    };
  </script>
</body>
</html>
