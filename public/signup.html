<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <style>
    :root {
      --bg: #fffaf0;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #b45309;
      --accent-2: #92400e;
      --border: #f1f5f9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #fde68a 0%, var(--bg) 48%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      padding: 24px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.4rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.96rem;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    #msg {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .link {
      margin-top: 14px;
      text-align: center;
      font-size: 0.92rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Signup</h2>

    <form id="signupForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Send OTP</button>
    </form>

    <div id="otpSection" style="display:none;">
      <input type="text" id="otp" placeholder="Enter OTP" />
      <button id="verifyBtn">Verify</button>
    </div>

    <p id="msg"></p>
    <p class="link">Already registered? <a href="/login.html">Login</a></p>
  </div>

  <script>
    const API = "/auth";
    const signupForm = document.getElementById("signupForm");
    const otpSection = document.getElementById("otpSection");
    const verifyBtn = document.getElementById("verifyBtn");
    const msg = document.getElementById("msg");
    let email = "";

    signupForm.onsubmit = async (e) => {
      e.preventDefault();

      email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(API + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.textContent = "OTP sent to your email. " + (data.otp ? "Test OTP: " + data.otp : "Check your inbox or Mailtrap.");
          signupForm.style.display = "none";
          otpSection.style.display = "block";
        } else {
          msg.textContent = data.error || "Signup failed";
        }
      } catch {
        msg.textContent = "Could not connect to server";
      }
    };

    verifyBtn.onclick = async () => {
      const otp = document.getElementById("otp").value;

      try {
        const res = await fetch(API + "/verify-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp }),
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("accessToken", data.accessToken);
          localStorage.setItem("refreshToken", data.refreshToken);
          msg.textContent = "Account created";
        } else {
          msg.textContent = data.error || "OTP verification failed";
        }
      } catch {
        msg.textContent = "Could not connect to server";
      }
    };
  </script>
</body>
</html>
